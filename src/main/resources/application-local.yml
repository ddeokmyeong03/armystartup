spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/${DB_NAME:armystartup}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:army}
    password: ${DB_PASSWORD:031021}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173

logging:
  level:
    com.armystartup: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
