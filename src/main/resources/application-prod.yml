spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    enabled: false   # prod에서는 Swagger UI 비활성화
  api-docs:
    enabled: false

cors:
  allowed-origins:
    - ${FRONTEND_URL:https://armystartup01.netlify.app}
    - https://armystartup01.netlify.app

logging:
  level:
    com.armystartup: INFO
