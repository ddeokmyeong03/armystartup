spring:
  datasource:
    # DB_URL: 전체 JDBC URL을 GCP Secret Manager에서 주입
    # Cloud SQL unix socket 예시:
    #   jdbc:mysql:///armystartup?socketFactory=com.google.cloud.sql.mysql.SocketFactory&cloudSqlInstance=PROJECT:REGION:INSTANCE&ipTypes=PUBLIC,PRIVATE
    # Cloud SQL TCP 예시:
    #   jdbc:mysql://<host>:3306/armystartup?useSSL=true&serverTimezone=Asia/Seoul
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    enabled: false   # prod에서는 Swagger UI 비활성화
  api-docs:
    enabled: false

cors:
  allowed-origins:
    - ${FRONTEND_URL:https://armystartup01.netlify.app}
    - https://armystartup01.netlify.app

logging:
  level:
    com.armystartup: INFO
