spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: ${PORT:8080}

jwt:
  secret: aBQwIbBXTkXqsaKcPWNoZvS/GeBeVok+xRXo4jXgmYeju8tg1BIBHhJ3oBtnG0bI
  access-token-expiration: 3600000       # 1시간 (ms)
  refresh-token-expiration: 604800000    # 7일 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs


openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
