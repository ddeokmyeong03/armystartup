<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Millog — 장병 자기개발 서비스</title>
<link rel="stylesheet" href="styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  #stage {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 54px;
    background: #000;
    box-shadow: 0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 40px 80px -20px rgba(34,255,178,0.2);
    overflow: hidden;
  }
  #stage::before {
    /* dynamic island */
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    border-radius: 20px;
    background: #000;
    z-index: 100;
  }
  #status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px 0;
    font-family: -apple-system, system-ui;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
    z-index: 60;
    pointer-events: none;
  }
  [data-mode="light"] #status-bar { color: #000; }
  #status-bar .right { display: flex; gap: 6px; align-items: center; }
  #app-root {
    position: absolute;
    top: 54px; left: 0; right: 0; bottom: 0;
  }
  .home-indicator {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
    z-index: 60;
  }
  [data-mode="light"] .home-indicator { background: rgba(0,0,0,0.35); }

  /* Phone container holds page + tab bar */
  .phone-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-base);
  }
  .page-host {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
</style>

<!-- Icon sprite inline so <use> works cross-origin-free -->
<script>
  fetch('design_system/icons.svg').then(r => r.text()).then(t => {
    const div = document.createElement('div');
    div.style.display = 'none';
    div.innerHTML = t;
    document.body.prepend(div);
  });
</script>
</head>
<body>

<div id="stage">
  <div id="status-bar">
    <span>9:41</span>
    <span class="right">
      <svg width="17" height="11" viewBox="0 0 17 11"><path d="M8.5 2.8C10.3 2.8 12 3.5 13.2 4.7L14 3.9C12.5 2.4 10.6 1.5 8.5 1.5C6.4 1.5 4.5 2.4 3 3.9L3.8 4.7C5 3.5 6.7 2.8 8.5 2.8Z" fill="currentColor"/><circle cx="8.5" cy="9" r="1.3" fill="currentColor"/></svg>
      <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="6.5" width="2.5" height="3.5" rx="0.5" fill="currentColor"/><rect x="4" y="4.5" width="2.5" height="5.5" rx="0.5" fill="currentColor"/><rect x="8" y="2.5" width="2.5" height="7.5" rx="0.5" fill="currentColor"/><rect x="12" y="0" width="2.5" height="10" rx="0.5" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/></svg>
    </span>
  </div>

  <div id="app-root"></div>
  <div class="home-indicator"></div>
</div>

<!-- Tweaks panel (always visible; respects toolbar toggle) -->
<div id="tweaks-root"></div>

<script>
// Persistent tweaks (simple)
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#1ed760",
  "mode": "light",
  "density": "compact",
  "userRank": "상병",
  "userName": "진덕명"
}/*EDITMODE-END*/;

let editModeOn = false;
let currentTweaks = { ...DEFAULTS };

function applyTweaks(t) {
  const root = document.documentElement;
  root.style.setProperty('--accent', t.accent);
  root.dataset.mode = t.mode;
  root.style.setProperty('--density-unit', t.density === 'compact' ? '0.85' : '1');
  // User info broadcast
  window.__tweaks = t;
  window.dispatchEvent(new CustomEvent('millog-tweaks', { detail: t }));
}
applyTweaks(currentTweaks);

function persistTweaks() {
  try {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: currentTweaks }, '*');
  } catch (e) {}
}

window.addEventListener('message', (ev) => {
  if (!ev.data || !ev.data.type) return;
  if (ev.data.type === '__activate_edit_mode') {
    editModeOn = true;
    renderTweaks();
  } else if (ev.data.type === '__deactivate_edit_mode') {
    editModeOn = false;
    renderTweaks();
  }
});

function renderTweaks() {
  const host = document.getElementById('tweaks-root');
  if (!editModeOn) { host.innerHTML = ''; return; }
  const t = currentTweaks;
  const colors = ['#22FFB2', '#1ed760', '#6a994e', '#a7c957', '#8ecae6', '#fb6f92'];
  const ranks = ['이병', '일병', '상병', '병장'];
  host.innerHTML = `
    <div class="tweaks-panel">
      <h4>Tweaks</h4>
      <div class="tweaks-row">
        <label>모드</label>
        <div class="tweaks-seg">
          <button data-k="mode" data-v="dark" class="${t.mode==='dark'?'on':''}">다크</button>
          <button data-k="mode" data-v="light" class="${t.mode==='light'?'on':''}">라이트</button>
        </div>
      </div>
      <div class="tweaks-row">
        <label>밀도</label>
        <div class="tweaks-seg">
          <button data-k="density" data-v="compact" class="${t.density==='compact'?'on':''}">컴팩트</button>
          <button data-k="density" data-v="comfy" class="${t.density==='comfy'?'on':''}">여유</button>
        </div>
      </div>
      <div class="tweaks-row">
        <label>액센트 컬러</label>
        <div class="tweaks-swatches">
          ${colors.map(c => `<button data-k="accent" data-v="${c}" class="${t.accent===c?'on':''}" style="background:${c}"></button>`).join('')}
        </div>
      </div>
      <div class="tweaks-row">
        <label>계급</label>
        <div class="tweaks-seg">
          ${ranks.map(r => `<button data-k="userRank" data-v="${r}" class="${t.userRank===r?'on':''}">${r}</button>`).join('')}
        </div>
      </div>
      <div class="tweaks-row">
        <label>이름</label>
        <input id="tweak-name" value="${t.userName}" style="width:100%;padding:6px 10px;border-radius:6px;background:#000;border:1px solid #333;color:#fff;font-size:12px;"/>
      </div>
      <div style="font-size:10px;color:#666;margin-top:12px;line-height:1.4;">로드맵 스타일은 곧 지원됩니다.</div>
    </div>
  `;
  host.querySelectorAll('button[data-k]').forEach(b => {
    b.addEventListener('click', () => {
      currentTweaks[b.dataset.k] = b.dataset.v;
      applyTweaks(currentTweaks);
      persistTweaks();
      renderTweaks();
    });
  });
  const n = document.getElementById('tweak-name');
  if (n) n.addEventListener('input', e => {
    currentTweaks.userName = e.target.value;
    applyTweaks(currentTweaks);
    persistTweaks();
  });
}

// Announce availability AFTER listener is registered
setTimeout(() => {
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
}, 50);
</script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="page_login.jsx"></script>
<script type="text/babel" src="page_home.jsx"></script>
<script type="text/babel" src="page_goals.jsx"></script>
<script type="text/babel" src="page_roadmap.jsx"></script>
<script type="text/babel" src="page_courses.jsx"></script>
<script type="text/babel" src="page_profile.jsx"></script>
<script type="text/babel" src="page_schedule.jsx"></script>
<script type="text/babel" src="page_profile_edit.jsx"></script>
<script type="text/babel" src="page_password.jsx"></script>
<script type="text/babel" src="page_notifications.jsx"></script>
<script type="text/babel" src="page_settings.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [tick, setTick] = useState(0);
  // Listen for tweaks that affect USER object
  useEffect(() => {
    const h = (e) => {
      const t = e.detail;
      if (window.USER) {
        window.USER.rank = t.userRank;
        window.USER.name = t.userName;
      }
      setTick(n => n + 1);
    };
    window.addEventListener('millog-tweaks', h);
    // Initial sync
    if (window.__tweaks && window.USER) {
      window.USER.rank = window.__tweaks.userRank;
      window.USER.name = window.__tweaks.userName;
    }
    return () => window.removeEventListener('millog-tweaks', h);
  }, []);

  return (
    <NavProvider>
      <Shell key={tick}/>
    </NavProvider>
  );
}

function Shell() {
  const { page } = useNav();
  const SUB_PAGES = ['login', 'schedule', 'profile-edit', 'password', 'notifications', 'settings'];
  const showTabs = !SUB_PAGES.includes(page);

  const content = (() => {
    switch (page) {
      case 'login':        return <LoginPage/>;
      case 'home':         return <HomePage/>;
      case 'goals':        return <GoalsPage/>;
      case 'roadmap':      return <RoadmapPage/>;
      case 'courses':      return <CoursesPage/>;
      case 'profile':      return <ProfilePage/>;
      case 'schedule':     return <SchedulePage/>;
      case 'profile-edit': return <ProfileEditPage/>;
      case 'password':     return <PasswordPage/>;
      case 'notifications':return <NotificationsPage/>;
      case 'settings':     return <SettingsPage/>;
      default:             return <HomePage/>;
    }
  })();

  return (
    <div className="phone-content" data-screen-label={pageLabel(page)}>
      <div className="page-host">
        {content}
      </div>
      {showTabs && <TabBar/>}
    </div>
  );
}

function pageLabel(p) {
  return ({
    login:         '01 Login',
    home:          '02 Home',
    goals:         '03 Goals',
    roadmap:       '04 Roadmap',
    courses:       '05 Courses',
    profile:       '06 Profile',
    schedule:      '07 Schedule',
    'profile-edit':'08 Profile Edit',
    password:      '09 Password',
    notifications: '10 Notifications',
    settings:      '11 Settings',
  })[p] || p;
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>

</body>
</html>
