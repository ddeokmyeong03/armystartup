spring:
  datasource:
    url: jdbc:h2:mem:armystartup;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:5174
    - http://localhost:8080
    - https://literate-doodle-7vvp5xgvjgr73pjr7-5174.app.github.dev
    - https://literate-doodle-7vvp5xgvjgr73pjr7-5174.app.github.dev
    - https://literate-doodle-7vvp5xgvjgr73pjr7-5174.app.github.dev

logging:
  level:
    com.armystartup: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
