spring:
  profiles:
    active: local

  jpa:
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:armystartup-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 3600000       # 1시간 (ms)
  refresh-token-expiration: 604800000    # 7일 (ms)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
