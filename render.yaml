services:
  - type: web
    name: millog-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build && npx prisma generate
    startCommand: "npx prisma migrate deploy && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: millog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: millog-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: millog-fatigue
    runtime: python
    rootDir: millog-fatigue
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "10000"

databases:
  - name: millog-db
    databaseName: millog
    plan: free
